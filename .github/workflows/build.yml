name: Build APK Local
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (Required for Android Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI and Dependencies
        run: |
          npm install -g eas-cli
          npm install

      - name: Build APK Locally
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-apk
          path: |
            android/app/build/outputs/apk/preview/*.apk
            *.apk
            **/*.apk
