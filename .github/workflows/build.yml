name: Android Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate Android Folder (Prebuild)
        run: npx expo prebuild --platform android

      - name: Ultimate Sonatype Bypass (Redirect to MavenCentral)
        run: |
          # Внедряем жесткое правило во все файлы build.gradle: игнорировать упавший сервер и брать из mavenCentral
          find android -name "build.gradle" -type f -exec sed -i 's|maven { url "https://oss.sonatype.org/content/repositories/snapshots" }|// removed sonatype|g' {} +
          
          # Дополнительно форсируем mavenCentral для всего проекта через настройки инициализации Gradle
          mkdir -p ~/.gradle
          echo "allprojects { repositories { maven { url 'https://repo1.maven.org/maven2/' } } }" > ~/.gradle/init.gradle

      - name: Build Android Release (Bypass Sonatype Timeout)
        run: |
          cd android
          ./gradlew assembleRelease -Pandroid.experimental.runLintInProcess=false -x lintVitalRelease -x lint

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
